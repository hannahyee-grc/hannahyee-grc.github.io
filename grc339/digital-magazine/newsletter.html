<!doctype html>
    <html lang="en">
        <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" /> <!-- You need this to proper scale in actual mobile devices.-->
             <!-- Don’t forget to link to your CSS here. -->
             <link rel="stylesheet" href="style.css">
             <link rel="stylesheet" href="https://use.typekit.net/jpc0eex.css">
                    
            <title>Ridgeline Newsletter</title> <!-- This will be replaced with the actual name of the publication later.  -->

            <!-- Helpful meta tags to fight GitHub aggresive caching-->
                <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
                <meta http-equiv="Pragma" content="no-cache" />
                <meta http-equiv="Expires" content="0" />
            
        </head>	

        <body>
            <div class="home-container">
                
                <!-- header is outside the main, but inside the div container. -->
                <header>
                    <h1>
                        <a href="index.html">
                        <img src="files/RidgelineLogo.svg" alt="ridgeline logo"></a>
                    </h1>

                <!-- For the nav, you can use the pound sign (#) for the value of the href attribute. -->

                <nav>
                    <ul>
                        <li>
                             Hiking
                        </li>
                        <li>
                            Camping
                        </li>
                        <li>
                          Climbing
                        </li>
                        <li>
                            Gear
                        </li>
                         <li>
                            <a href="photograllery.html">Photo Gallery</a>
                        </li>
                        <li>
                            <a href="newsletter.html">Join our Newsletter</a>
                        </li>
                       
                    </ul>
                </nav>
            </header>

            <main class="form">

                <figure>
                    <img src="files/firetrail.jpeg" alt="Los Padres National Forest off HWY 1 in Big Sur.">
                    <figcaption>Prewitt Loop Trail in Los Padres National Forest</figcaption>
                </figure>

                <form>
                    <section class="personal-info">
                        <h2>Personal information</h2>
                        <ul>
                            <li><label for="name">Name:</label> <input type="text" name="name" id="name" placeholder="your full name" /></li>
                            <li><label for="email">Email:</label> <input type="email" name="email" id="email" placeholder="confirmation email" /></li>
                            <li><label for="phone">Phone:</label> <input type="tel" name="phone" id="phone" placeholder="your phone number" /></li>
                        </ul>
                    </section>
</form>

<section class="interests">
    <h2>What adventures interest you most?</h2>

    <ul>
        <li>
            <input type="checkbox" id="hiking" name="interests" value="hiking">
            <label for="hiking">Hiking</label>
        </li>

        <li>
            <input type="checkbox" id="camping" name="interests" value="camping">
            <label for="camping">Camping</label>
        </li>

        <li>
            <input type="checkbox" id="backpacking" name="interests" value="backpacking">
            <label for="backpacking">Backpacking</label>
        </li>

        <li>
            <input type="checkbox" id="climbing" name="interests" value="climbing">
            <label for="climbing">Climbing</label>
        </li>

        <li>
            <input type="checkbox" id="trailrunning" name="interests" value="trailrunning">
            <label for="trailrunning">Trail Running</label>
        </li>

        <li>
            <input type="checkbox" id="gear" name="interests" value="gear">
            <label for="gear">Gear Reviews</label>
        </li>
    </ul>
</section>

<section class="submit">
    <button type="submit">Join the Ridgeline Community</button>
</section>
            </main>

                

               <!-- Same footer as home page. -->
               <footer>
                <p>All rights reserved.</p>
            </footer>

            </div>
        </body>
    </html>
